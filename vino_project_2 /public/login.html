<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<link rel="stylesheet" href="login.css">
</head>

<body>
    <div class="heading">
     <h3>CareerBridge - Smart Placement Portal</h3>   
    </div>

<div class="login-container">

<h2>Login</h2>
     

<select id="role">
<option value="student">Student</option>
<option value="admin">Admin</option>
</select>

<label class="label">Email / Username</label>
<input type="text" id="email" placeholder="Enter email">

<label class="label">Password</label>
<input type="password" id="password" placeholder="Enter password">

<button onclick="login()">Login</button>

<a href="register.html">
    <button class="register-btn">Register</button>
</a>

</div>
<script>

function login(){

const role=document.getElementById("role").value;
const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

if(role==="student"){

fetch("/api/auth/login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
email:email,
password:password
})
})
.then(res=>res.json())
.then(data=>{
console.log("/api/auth/login response:", data);
const msg = data && data.message ? data.message : "No response message";

if(msg==="Login success"){
localStorage.setItem("student",JSON.stringify(data.user));
window.location.href="student_dashboard.html";
}else{
alert("Invalid Login: " + msg);
}
})
.catch(err=>{
console.error("Login error:", err);
alert("Network / server error: " + (err.message || err));
});

}else{

fetch("/api/admin/login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
username:email,
password:password
})
})
.then(res=>res.json())
.then(data=>{
console.log("/api/admin/login response:", data);
const msg = data && data.message ? data.message : "No response message";

if(msg==="Admin Login Success"){
window.location.href="admin_dashboard.html";
}else{
alert("Invalid Login: " + msg);
}
})
.catch(err=>{
console.error("Admin login error:", err);
alert("Network / server error: " + (err.message || err));
});

}

}

</script>

</body>
</html>
