<!DOCTYPE html>
<html>
<head>
<title>Student Registration</title>
<link rel="stylesheet" href="register.css">
</head>

<body>

<div class="form-container">

<h2>Placement Registration</h2>

<form id="form" enctype="multipart/form-data">

<input type="text" name="name" placeholder="Name">

<input type="email" name="email" placeholder="Email">

<input type="password" name="password" placeholder="Password">

<input type="text" name="phone" placeholder="Phone">

<input type="text" name="college" placeholder="College">

<input type="text" name="degree" placeholder="Degree">

<input type="text" name="skills" placeholder="Skills">

<input type="number" step="0.01" name="cgpa" placeholder="CGPA">

<input type="number" name="graduation_year" placeholder="Year">

<div class="file-upload">
    <input type="file" name="resume" id="resume">
    <label for="resume">📄 Upload Resume</label>
    <span id="file-name">No file chosen</span>
</div>

<button type="submit">Register</button>

</form>

</div>
<script>

const form=document.getElementById("form");

form.addEventListener("submit",function(e){

e.preventDefault();

const data=new FormData(form);

fetch("/api/students/register",{
method:"POST",
body:data
})
.then(res=>res.json())
.then(data=>{
alert(data.message);
});

});

document.getElementById("resume").addEventListener("change", function() {
    const fileName = this.files[0]?.name || "No file chosen";
    document.getElementById("file-name").textContent = fileName;
});

</script>

</body>
</html>
